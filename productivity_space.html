<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Space</title>
    <style>
        :root {
            --success-color: #48bb78;
            --danger-color: #f56565;
            --glass-white: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('marko-blazevic-S7mAngnWV1A-unsplash.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            height: 85vh;
        }

        .card {
            background: var(--glass-white);
            /* Reduced blur to make background visible */
            backdrop-filter: blur(2px); 
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Layout Assignments */
        .title-card { grid-column: 1 / 2; grid-row: 1 / 2; background: transparent; border: none; box-shadow: none; backdrop-filter: none; padding: 0; }
        .progress-card { grid-column: 1 / 2; grid-row: 2 / 3; }
        .todo-card { grid-column: 1 / 2; grid-row: 3 / 4; }
        .timer-card { grid-column: 2 / 3; grid-row: 1 / 3; text-align: center; justify-content: center; }
        .planner-card { grid-column: 2 / 3; grid-row: 3 / 4; }

        h1, h3, .time-display { text-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        /* Inputs & List Items */
        input[type="text"], input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: white;
            outline: none;
        }

        .todo-list, .planner-timeline { overflow-y: auto; flex: 1; margin-top: 10px; }
        .todo-item, .time-slot { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .todo-text, .slot-input { flex: 1; margin-left: 10px; background: transparent; border: none; color: white; font-size: 1rem; }

        /* Progress Bar */
        .progress-container { width: 100%; background: rgba(0, 0, 0, 0.2); border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--success-color); transition: width 0.5s ease; box-shadow: 0 0 10px var(--success-color); }

        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--glass-border); cursor: pointer; background: rgba(255,255,255,0.1); color: white; transition: 0.2s; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-ghost { background: transparent; border: none; font-size: 0.8rem; opacity: 0.8; }
        .active { border-bottom: 2px solid white; border-radius: 0; }

        .attribution { margin-top: 30px; font-size: 0.75rem; opacity: 0.7; }
        .attribution a { color: white; }

        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; height: auto; } }
    </style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">
</head>
<body>

    <div class="dashboard">
        <div class="card title-card">
            <h1>Productivity Space</h1>
            <p id="dateDisplay" style="opacity: 0.8;"></p>
        </div>

        <div class="card progress-card">
            <div style="display:flex; justify-content: space-between; font-size: 0.85rem;">
                <span>Progress</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="card todo-card">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h3>Tasks</h3>
                <button class="btn btn-ghost" id="clearCompleted">Clear Done</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="todoInput" placeholder="New objective..." style="flex:1">
                <button class="btn" id="addTodoBtn">Add</button>
            </div>
            <ul class="todo-list" id="todoList"></ul>
        </div>

        <div class="card timer-card">
            <div style="margin-bottom: 10px;">
                <button class="btn btn-ghost active" id="clockTab">Clock</button>
                <button class="btn btn-ghost" id="timerTab">Timer</button>
            </div>
            <div id="clockMode"><div class="time-display" id="clockDisplay" style="font-size: 4rem;">00:00:00</div></div>
            <div id="timerMode" style="display: none;">
                <div class="time-display" id="timerDisplay" style="font-size: 4rem;">05:00</div>
                <input type="number" id="timerMinutes" value="5" style="width: 60px; text-align: center;">
                <button class="btn" id="startTimerBtn">Start</button>
                <button class="btn btn-ghost" id="resetTimerBtn">Reset</button>
            </div>
        </div>

        <div class="card planner-card">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h3>Day Schedule</h3>
                <button class="btn btn-ghost" id="clearPlanner" style="color:var(--danger-color)">Reset Day</button>
            </div>
            <div class="planner-timeline" id="plannerTimeline"></div>
        </div>
    </div>

    <footer class="attribution">
        Photo by <a href="https://unsplash.com/@mblazevic" target="_blank">Marko Blažević</a> on Unsplash
    </footer>

    <script>
        /* --- CORE LOGIC --- */
        let todos = JSON.parse(localStorage.getItem('db-todos')) || [];
        let schedule = JSON.parse(localStorage.getItem('db-schedule')) || {};

        function saveAndRender() {
            localStorage.setItem('db-todos', JSON.stringify(todos));
            const list = document.getElementById('todoList');
            list.innerHTML = '';
            todos.forEach((t, i) => {
                const li = document.createElement('li');
                li.className = `todo-item ${t.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${i})">
                    <input type="text" class="todo-text" value="${t.text}" onblur="editTodo(${i}, this.value)">
                    <button class="btn btn-ghost" onclick="deleteTodo(${i})">×</button>`;
                list.appendChild(li);
            });
            updateProgress();
        }

        window.toggleTodo = (i) => { todos[i].completed = !todos[i].completed; saveAndRender(); };
        window.deleteTodo = (i) => { todos.splice(i, 1); saveAndRender(); };
        window.editTodo = (i, v) => { todos[i].text = v; localStorage.setItem('db-todos', JSON.stringify(todos)); };


        document.addEventListener('keydown', function(e) {
            // Check if the 'T' key was pressed
            if (e.key.toLowerCase() === 't') {
                // List of tags we don't want to interrupt if the user is typing in them
                const activeTag = document.activeElement.tagName.toLowerCase();
                const isTyping = activeTag === 'input' || activeTag === 'textarea';

                if (!isTyping) {
                    e.preventDefault(); // Prevent 't' from being typed
                    const input = document.getElementById('todoInput');
                    input.focus();
                    // Optional: clear the input if you want a fresh start
                    input.value = ''; 
                }
            }
        });
        document.getElementById('todoInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.getElementById('addTodoBtn').click();
            }   
        });
        document.getElementById('addTodoBtn').onclick = () => {
            const val = document.getElementById('todoInput').value;
            if(val) { todos.push({text: val, completed: false}); document.getElementById('todoInput').value = ''; saveAndRender(); }
        };

        function updateProgress() {
            const pct = todos.length ? Math.round((todos.filter(t => t.completed).length / todos.length) * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').innerText = pct + '%';
        }

        /* --- TIMER --- */
        let timer;
        let left = 0;
        document.getElementById('startTimerBtn').onclick = function() {
            if(this.innerText === 'Start') {
                if(left <= 0) left = document.getElementById('timerMinutes').value * 60;
                this.innerText = 'Pause';
                timer = setInterval(() => {
                    left--;
                    let m = Math.floor(left/60), s = left%60;
                    document.getElementById('timerDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    if(left <= 0) { clearInterval(timer); alert("Quest Complete!"); this.innerText = 'Start'; }
                }, 1000);
            } else {
                clearInterval(timer);
                this.innerText = 'Start';
            }
        };

        /* --- CLOCK & DATE --- */
        setInterval(() => {
            const now = new Date();
            document.getElementById('clockDisplay').innerText = now.toLocaleTimeString([], {hour12:false});
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric'});
        }, 1000);

        /* --- PLANNER --- */
        const hours = [
            "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", 
            "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", 
            "20:00", "21:00", "22:00"
        ];
        function initPlanner() {
            const cont = document.getElementById('plannerTimeline');
            cont.innerHTML = '';
            hours.forEach(h => {
                const div = document.createElement('div');
                div.className = 'time-slot';
                div.innerHTML = `<span style="width:50px; font-size:0.7rem;">${h}</span><input type="text" class="slot-input" value="${schedule[h] || ''}" onblur="saveSchedule('${h}', this.value)">`;
                cont.appendChild(div);
            });
        }
        window.saveSchedule = (h, v) => { schedule[h] = v; localStorage.setItem('db-schedule', JSON.stringify(schedule)); };

        /* --- TABS --- */
        document.getElementById('clockTab').onclick = () => { document.getElementById('clockMode').style.display = 'block'; document.getElementById('timerMode').style.display = 'none'; };
        document.getElementById('timerTab').onclick = () => { document.getElementById('clockMode').style.display = 'none'; document.getElementById('timerMode').style.display = 'block'; };

        saveAndRender();
        initPlanner();
    </script>
</body>
</html>
