<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art Helper</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Jim+Nightshade&family=Alice&display=swap" rel="stylesheet">

    <style>
        :root { --font-titles: 'Limelight', cursive; --font-subheadings: 'Jim Nightshade', cursive; --font-body: 'Alice', Georgia, serif; --text-main: #260808; --header-bg: #4b1912; --btn-bg: #8c5e47; }
        body { font-family: var(--font-body) !important; background-color: #f9f8f6; color: var(--text-main) !important; }
        main { background-color: rgba(255, 255, 255, 0.9); padding: 2rem; border: 3px solid var(--text-main); }
        button.btn-action { background: var(--btn-bg) !important; color: #ffffff !important; border: 2px solid var(--text-main) !important; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <header class="bg-stone-900 py-6 text-center text-white"><h1>AP Art Helper</h1></header>

    <main class="max-w-7xl mx-auto px-4">
        <section class="mb-8 flex gap-4">
            <button onclick="exportDataToJSONFile()" class="btn-action px-4 py-2 text-sm font-bold">⬇️ Export Project Backup</button>
            <button onclick="promptNewFolder()" class="btn-action px-4 py-2 text-sm font-bold">+ New Folder</button>
        </section>

        <section id="directory-canvas-view" class="bg-stone-100 p-4 min-h-[20rem] border-2 border-stone-300"></section>
    </main>

    <script>
        localforage.config({ name: 'AP_Art_Local_Images', storeName: 'image_shelf' });

        // Correctly initialize state ONCE
        let appData = {
            sustainedInvestigation: "", 
            folders: [{
                id: "ap-portfolio-default-system-id",
                name: "AP Art Portfolio Stuff",
                isDefaultAP: true,
                maxSlots: 15, 
                items: {}
            }]
        };

        let currentOpenFolderId = null; 
        let activeSlotKey = null;
        let isExporting = false; // Flag to prevent annoying warnings during export

        // --- EXPORT/IMPORT LOGIC ---
        function exportDataToJSONFile() {
            isExporting = true; // Tell the "beforeunload" listener not to nag
            const dataBlob = new Blob([JSON.stringify(appData, null, 2)], { type: "application/json" });
            const urlLink = URL.createObjectURL(dataBlob);
            const tempAnchor = document.createElement("a");
            tempAnchor.href = urlLink;
            tempAnchor.download = `ap-backup-${Date.now()}.json`;
            tempAnchor.click();
            
            setTimeout(() => { isExporting = false; }, 1000); // Reset after 1 second
        }

        // --- TAB CLOSE WARNING ---
        window.addEventListener('beforeunload', function (e) {
            if (!isExporting) {
                e.preventDefault();
                e.returnValue = 'Wait! Did you export your latest work?';
                return 'Wait! Did you export your latest work?';
            }
        });

        // --- RENDER LOGIC ---
        function renderFileSystemViewCanvas() {
            const canvas = document.getElementById('directory-canvas-view');
            canvas.innerHTML = '';
            
            // ... (The rest of your existing folder rendering logic goes here) ...
            console.log("Canvas rendered with", appData.folders.length, "folders.");
        }

        // Initialize
        renderFileSystemViewCanvas();
    </script>
</body>
</html>
