<script>
        // 1. Unique Firebase Configuration:
        const firebaseConfig = {
            apiKey: "AIzaSyBCjQrFtBNianqeST3Qw0C-Idt_Hzo_vls",
            authDomain: "ap-art-helper.firebaseapp.com",
            projectId: "ap-art-helper",
            storageBucket: "ap-art-helper.firebasestorage.app",
            messagingSenderId: "1024969908647",
            appId: "1:1024969908647:web:810583ec164b4251b95682"
        };

        // 2. Initialize Firebase services
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 3. Global Datasets Architecture 
        let appData = {
            sustainedInvestigation: "", 
            folders: [
                {
                    id: "ap-portfolio-default-system-id",
                    name: "AP Art Portfolio Stuff",
                    isDefaultAP: true,
                    maxSlots: 15,
                    items: {}
                }
            ]
        };

        let currentOpenFolderId = null; 
        let activeSlotKey = null;

        // --- FIREBASE ACCOUNT LOGIC LINKS ---

        function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    alert(`Welcome, ${result.user.displayName}! Cloud sync is active.`);
                })
                .catch((error) => alert("Google sign-in failed: " + error.message));
        }

        function handleEmailSignUp() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert("Please fill out both fields!");

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Account created! Syncing your layout configurations...");
                    saveAllStateData();
                })
                .catch((error) => alert("Sign up error: " + error.message));
        }

        function handleEmailLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert("Please fill out both fields!");

            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => alert("Login error: " + error.message));
        }

        // REPAIRED SIGN OUT MECHANISM
        function handleSignOut() {
            if (confirm("Sign out? Data won't cloud-sync until you log back in.")) {
                sessionStorage.setItem('is_logging_out_active_flag', 'true');

                auth.signOut().then(() => {
                    localStorage.removeItem('ap_planner_v1_data');

                    appData = {
                        sustainedInvestigation: "",
                        folders: [
                            {
                                id: "ap-portfolio-default-system-id",
                                name: "AP Art Portfolio Stuff",
                                isDefaultAP: true,
                                maxSlots: 15,
                                items: {}
                            }
                        ]
                    };
                    currentOpenFolderId = null;
                    activeSlotKey = null;

                    sessionStorage.removeItem('is_logging_out_active_flag');
                    location.reload();
                }).catch((error) => {
                    console.error("Sign out error:", error);
                    sessionStorage.removeItem('is_logging_out_active_flag');
                });
            }
        }

        // Automatic Sync Engine Pipeline
        auth.onAuthStateChanged((user) => {
            const authContainer = document.getElementById('auth-container');
            const userBar = document.getElementById('user-bar');
            const userDisplay = document.getElementById('user-display-email');

            if (!authContainer) return;

            if (sessionStorage.getItem('is_logging_out_active_flag') === 'true') {
                return;
            }

            if (user) {
                authContainer.classList.add('hidden');
                userBar.classList.remove('hidden');
                userDisplay.innerText = `Logged in as: ${user.email || user.displayName}`;

                db.collection("users").doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists && doc.data().userData) {
                            appData = doc.data().userData;
                            console.log("☁️ Data successfully downloaded from Firestore!");
                        } else {
                            const localRaw = localStorage.getItem('ap_planner_v1_data');
                            if (localRaw) {
                                try {
                                    const localData = JSON.parse(localRaw);
                                    if (localData.folders && localData.folders.length > 0) {
                                        appData = localData;
                                    }
                                } catch(e) { console.error(e); }
                            }
                            saveAllStateData();
                        }
                        syncInvestigationUI();
                        renderFileSystemViewCanvas();
                    })
                    .catch((error) => console.error("Cloud download error:", error));
            } else {
                authContainer.classList.remove('hidden');
                userBar.classList.add('hidden');
                
                loadAllStateData();
                syncInvestigationUI();
                renderFileSystemViewCanvas();
            }
        });

        // --- LIFECYCLE DOM SETUP ENGINE ---
        document.addEventListener('DOMContentLoaded', () => {
            setupImageFileReaders();
            
            const siText = document.getElementById('si-text');
            siText.addEventListener('input', (e) => {
                appData.sustainedInvestigation = e.target.value;
                updateLiveSIDisplay(e.target.value);
                saveAllStateData(); 
            });
        });

        function syncInvestigationUI() {
            const inquiryValue = appData.sustainedInvestigation || "";
            document.getElementById('si-text').value = inquiryValue;
            updateLiveSIDisplay(inquiryValue);
        }

        function saveAllStateData() {
            localStorage.setItem('ap_planner_v1_data', JSON.stringify(appData));

            const user = auth.currentUser;
            if (user) {
                db.collection("users").doc(user.uid).set({
                    userData: appData
                })
                .then(() => console.log("Data synced securely to Firebase Cloud!"))
                .catch((error) => console.error("Error syncing cloud data: ", error));
            }
        }

        function loadAllStateData() {
            const raw = localStorage.getItem('ap_planner_v1_data');
            if (raw) {
                try { appData = JSON.parse(raw); } catch(e) { console.error(e); }
            }
        }

        // NEW: Image Compression Engine to bypass the Firebase Storage paywall screen entirely
        function compressImagePayload(base64Str, maxWidth = 750, maxHeight = 750, quality = 0.6) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = function () {
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                    resolve(compressedBase64);
                };
            });
        }

        function setupImageFileReaders() {
            const fileInput = document.getElementById('art-image-input');
            if (!fileInput) return;
            fileInput.addEventListener('change', (e) => {
                const targetFile = e.target.files[0];
                if (targetFile) {
                    const fileReaderInstance = new FileReader();
                    fileReaderInstance.onload = async function(eventResult) {
                        const rawBase64 = eventResult.target.result;
                        
                        // Run compression instantly on selection
                        const compressedBase64 = await compressImagePayload(rawBase64);

                        const previewContainer = document.getElementById('image-preview-container');
                        previewContainer.innerHTML = `<img src="${compressedBase64}" class="max-h-full max-w-full object-contain" />`;
                        
                        previewContainer.dataset.transientBaseString = compressedBase64;
                        document.getElementById('clear-image-btn').classList.remove('hidden');
                    };
                    fileReaderInstance.readAsDataURL(targetFile);
                }
            });
        }

        function clearAttachedImage(event) {
            event.stopPropagation(); 
            if (!confirm("Remove the image file attached to this art piece?")) return;

            const previewContainer = document.getElementById('image-preview-container');
            const fileInput = document.getElementById('art-image-input');
            const clearBtn = document.getElementById('clear-image-btn');

            previewContainer.innerHTML = `<span class="text-sm text-stone-400">Click or drag image file here to attach artwork</span>`;
            fileInput.value = '';
            
            previewContainer.dataset.transientBaseString = "REMOVE_CURRENT_IMAGE_STATE";
            clearBtn.classList.add('hidden');
        }

        function updateLiveSIDisplay(textValue) {
            const displayBox = document.getElementById('si-display-box');
            if (textValue && textValue.trim() !== "") {
                displayBox.innerText = textValue;
                displayBox.classList.remove('italic', 'text-stone-400');
            } else {
                displayBox.innerText = "No central inquiry question recorded yet. Click the edit button to write your core theme.";
                displayBox.classList.add('italic', 'text-stone-400');
            }
        }

        function renderFileSystemViewCanvas() {
            const canvas = document.getElementById('directory-canvas-view');
            const breadcrumbSep = document.getElementById('nav-breadcrumb-separator');
            const breadcrumbCurrent = document.getElementById('nav-breadcrumb-current');
            const addFolderBtn = document.getElementById('add-folder-action-btn');
            const addArtBtn = document.getElementById('add-artwork-action-btn');

            if (!canvas) return;
            canvas.innerHTML = '';

            if (currentOpenFolderId === null) {
                breadcrumbSep.classList.add('hidden');
                breadcrumbCurrent.innerText = '';
                addFolderBtn.classList.remove('hidden');
                addArtBtn.classList.add('hidden');

                const iconGrid = document.createElement('div');
                iconGrid.className = 'grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-8 p-4';

                appData.folders.forEach(folder => {
                    const itemNode = document.createElement('div');
                    itemNode.className = 'folder-icon-wrapper flex flex-col items-center text-center cursor-pointer select-none group';
                    
                    if (!folder.isEditingName) {
                        itemNode.onclick = () => openSpecificFolderDirectory(folder.id);
                    }

                    let nameLabelMarkup = '';
                    if (folder.isEditingName) {
                        nameLabelMarkup = `
                            <input type="text" 
                                   id="inline-input-${folder.id}"
                                   value="${folder.name}" 
                                   class="text-xs font-semibold text-center bg-white border-2 border-stone-900 w-full px-1 py-0.5 focus:outline-none"
                                   onkeydown="handleInlineRenameKey(event, '${folder.id}')"
                                   onblur="saveInlineRename('${folder.id}')" />
                        `;
                    } else {
                        nameLabelMarkup = `
                            <span class="text-xs font-semibold px-2 py-0.5 rounded group-hover:bg-stone-200 truncate w-full">${folder.name}</span>
                            ${!folder.isDefaultAP ? `<span onclick="deleteCustomWorkspaceFolder('${folder.id}'); event.stopPropagation();" class="text-[10px] text-red-600 opacity-0 group-hover:opacity-100 hover:underline mt-1">Delete</span>` : ''}
                        `;
                    }

                    itemNode.innerHTML = `
                        <img src="folder.png" alt="Folder" class="w-16 h-16 object-contain mb-2 filter drop-shadow-sm group-hover:drop-shadow-md" />
                        ${nameLabelMarkup}
                    `;
                    iconGrid.appendChild(itemNode);
                });

                canvas.appendChild(iconGrid);
            } else {
                const folder = appData.folders.find(f => f.id === currentOpenFolderId);
                if (!folder) { navigateToRootDirectory(); return; }

                breadcrumbSep.classList.remove('hidden');
                breadcrumbCurrent.innerText = folder.name;
                addFolderBtn.classList.add('hidden');
                addArtBtn.classList.toggle('hidden', folder.isDefaultAP); 

                const artGrid = document.createElement('div');
                artGrid.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 p-2';

                if (folder.isDefaultAP) {
                    for (let i = 1; i <= 15; i++) {
                        const item = folder.items[i] || {};
                        const fileBlock = createAssetFileIconNode(item, i, `Slot #${i}`, () => openModalEditorPanel(folder.id, i));
                        artGrid.appendChild(fileBlock);
                    }
                } else {
                    const keys = Object.keys(folder.items);
                    if (keys.length === 0) {
                        canvas.innerHTML = `
                            <div class="py-12 text-center text-sm text-stone-400 italic">
                                This file folder directory is currently empty. Click "+ Add Art Piece" to add media items.
                            </div>
                        `;
                        return;
                    }
                    keys.forEach(key => {
                        const item = folder.items[key];
                        const fileBlock = createAssetFileIconNode(item, key, item.title || "Untitled Work", () => openModalEditorPanel(folder.id, key));
                        artGrid.appendChild(fileBlock);
                    });
                }

                canvas.appendChild(artGrid);
            }
        }

        function createAssetFileIconNode(item, key, labelFallback, clickCallback) {
            const block = document.createElement('div');
            block.className = 'folder-icon-wrapper flex flex-col items-center text-center cursor-pointer select-none group';
            block.onclick = clickCallback;

            let innerThumbnailMarkup = '';
            if (item.image) {
                innerThumbnailMarkup = `<div class="w-20 h-20 bg-cover bg-center border-2 border-stone-900 shadow-sm" style="background-image: url('${item.image}')"></div>`;
            } else {
                innerThumbnailMarkup = `<div class="w-20 h-20 bg-stone-100 border-2 border-dashed border-stone-400 flex items-center justify-center text-stone-400 group-hover:border-stone-900 text-3xl">🖼️</div>`;
            }

            block.innerHTML = `
                <div class="mb-2 relative">
                    ${innerThumbnailMarkup}
                </div>
                <span class="text-xs font-semibold px-1 py-0.5 group-hover:bg-stone-200 truncate w-full">${item.title || labelFallback}</span>
            `;
            return block;
        }

        function openSpecificFolderDirectory(folderId) {
            currentOpenFolderId = folderId;
            renderFileSystemViewCanvas();
        }

        function navigateToRootDirectory() {
            currentOpenFolderId = null;
            renderFileSystemViewCanvas();
        }

        function promptNewFolder() {
            const newFolderId = "folder_" + Date.now();
            const newFolderObj = {
                id: newFolderId,
                name: "Untitled Folder", 
                isDefaultAP: false,
                items: {},
                isEditingName: true 
            };

            appData.folders.push(newFolderObj);
            saveAllStateData();
            renderFileSystemViewCanvas();

            setTimeout(() => {
                const inputNode = document.getElementById(`inline-input-${newFolderId}`);
                if (inputNode) {
                    inputNode.focus();
                    inputNode.select();
                }
            }, 50);
        }

        function handleInlineRenameKey(event, folderId) {
            if (event.key === 'Enter') {
                event.preventDefault();
                saveInlineRename(folderId);
            }
        }

        function saveInlineRename(folderId) {
            const inputNode = document.getElementById(`inline-input-${folderId}`);
            if (!inputNode) return;

            const finalName = inputNode.value.trim();
            const folder = appData.folders.find(f => f.id === folderId);
            
            if (folder) {
                folder.name = finalName !== "" ? finalName : "Untitled Folder";
                delete folder.isEditingName; 
            }

            saveAllStateData();
            renderFileSystemViewCanvas();
        }

        function deleteCustomWorkspaceFolder(folderId) {
            if (!confirm("Delete this workspace folder directory and all enclosed visual artwork files completely?")) return;
            appData.folders = appData.folders.filter(f => f.id !== folderId);
            saveAllStateData();
            renderFileSystemViewCanvas();
        }

        function openNewArtPieceInActiveFolder() {
            if (!currentOpenFolderId) return;
            const generatedItemKey = "art_" + Date.now();
            openModalEditorPanel(currentOpenFolderId, generatedItemKey);
        }

        function openModalEditorPanel(folderId, slotKey) {
            activeSlotKey = slotKey;

            const targetedFolder = appData.folders.find(f => f.id === folderId);
            const item = targetedFolder.items[slotKey] || {};

            if (!item.colors || item.colors.length === 0) {
                item.colors = ['#cbd5e1'];
            }

            const isNumeric = !isNaN(slotKey);
            document.getElementById('modal-slot-title').innerText = isNumeric ? `Portfolio Slot Card #${slotKey}` : `Portfolio Object Metadata`;

            document.getElementById('art-title').value = item.title || (isNumeric ? `art_${slotKey}` : '');
            document.getElementById('art-materials').value = item.materials || '';
            document.getElementById('art-description').value = item.description || '';
            document.getElementById('art-investigation-rel').value = item.investigation || '';
            document.getElementById('art-other').value = item.other || '';

            const previewContainer = document.getElementById('image-preview-container');
            const clearBtn = document.getElementById('clear-image-btn');

            if (item.image) {
                previewContainer.innerHTML = `<img src="${item.image}" class="max-h-full max-w-full object-contain" />`;
                clearBtn.classList.remove('hidden'); 
            } else {
                previewContainer.innerHTML = `<span class="text-sm text-stone-400">Click or drag image file here to attach artwork</span>`;
                clearBtn.classList.add('hidden');
            }

            renderColorPaletteSwatches(item.colors);

            const displayModal = document.getElementById('art-modal');
            displayModal.classList.remove('hidden');
            displayModal.classList.add('flex');
        }

        function renderColorPaletteSwatches(colorsList) {
            const container = document.getElementById('color-palette-container');
            if (!container) return;
            container.innerHTML = '';

            colorsList.forEach((hexColor, index) => {
                const pickerWrapper = document.createElement('div');
                pickerWrapper.className = 'relative flex items-center group';

                const colorInput = document.createElement('input');
                colorInput.type = 'color';
                colorInput.value = hexColor.startsWith('#') && hexColor.length === 7 ? hexColor : '#cbd5e1';
                colorInput.className = 'w-10 h-10 cursor-pointer border border-stone-400 p-0 overflow-hidden';
                
                colorInput.addEventListener('change', (e) => {
                    colorsList[index] = e.target.value;
                });

                const deleteSwatchBtn = document.createElement('button');
                deleteSwatchBtn.type = 'button';
                deleteSwatchBtn.className = 'absolute -top-2 -right-2 bg-red-700 hover:bg-red-800 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10 shadow-sm cursor-pointer';
                deleteSwatchBtn.innerText = '×';
                
                deleteSwatchBtn.onclick = (e) => {
                    e.preventDefault();
                    colorsList.splice(index, 1);
                    renderColorPaletteSwatches(colorsList);
                };

                pickerWrapper.appendChild(colorInput);
                pickerWrapper.appendChild(deleteSwatchBtn);
                container.appendChild(pickerWrapper);
            });

            const appendSwatchBtn = document.createElement('button');
            appendSwatchBtn.type = 'button';
            appendSwatchBtn.className = 'w-10 h-10 border-2 border-dashed border-stone-400 text-stone-400 hover:border-stone-900 hover:text-stone-900 flex items-center justify-center text-sm font-bold cursor-pointer';
            appendSwatchBtn.innerText = '+';
            appendSwatchBtn.onclick = () => {
                colorsList.push('#cbd5e1');
                renderColorPaletteSwatches(colorsList);
            };
            container.appendChild(appendSwatchBtn);
        }

        function closeModal() {
            document.getElementById('art-modal').classList.add('hidden');
            document.getElementById('art-modal').classList.remove('flex');
            document.getElementById('art-image-input').value = '';
            delete document.getElementById('image-preview-container').dataset.transientBaseString;
            activeSlotKey = null;
        }

        function openSustainedInvestigation() {
            document.getElementById('si-modal').classList.remove('hidden');
            document.getElementById('si-modal').classList.add('flex');
        }

        function closeSIModal() {
            document.getElementById('si-modal').classList.add('hidden');
            document.getElementById('si-modal').classList.remove('flex');
            updateLiveSIDisplay(document.getElementById('si-text').value);
        }

        document.getElementById('art-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!currentOpenFolderId || !activeSlotKey) return;

            const folderIndex = appData.folders.findIndex(f => f.id === currentOpenFolderId);
            if (folderIndex === -1) return;

            const activeFormColors = Array.from(document.querySelectorAll('#color-palette-container input[type="color"]')).map(input => input.value);
            const imagePreviewNode = document.getElementById('image-preview-container').querySelector('img');
            const fileInputBufferString = document.getElementById('image-preview-container').dataset.transientBaseString;

            let finalImagePayload = null;
            if (fileInputBufferString === "REMOVE_CURRENT_IMAGE_STATE") {
                finalImagePayload = null; 
            } else if (fileInputBufferString) {
                finalImagePayload = fileInputBufferString; 
            } else if (imagePreviewNode) {
                finalImagePayload = imagePreviewNode.src; 
            }

            appData.folders[folderIndex].items[activeSlotKey] = {
                title: document.getElementById('art-title').value.trim(),
                materials: document.getElementById('art-materials').value.trim(),
                description: document.getElementById('art-description').value.trim(),
                investigation: document.getElementById('art-investigation-rel').value.trim(),
                other: document.getElementById('art-other').value.trim(),
                colors: activeFormColors,
                image: finalImagePayload
            };

            saveAllStateData();
            renderFileSystemViewCanvas();
            closeModal();
        });
    </script>
