<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art Helper</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Jim+Nightshade&family=Alice&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-titles: 'Limelight', cursive;
            --font-subheadings: 'Jim Nightshade', cursive;
            --font-body: 'Alice', Georgia, serif;

            --bg-image-url: url('castle-background.jpg');

            --text-main: #260808;      
            --header-bg: #4b1912;      
            --card-border: #593c33;    
            --btn-bg: #8c5e47;         
            --accent-border: #c8a588;  

            --transition-speed: 0.2s;
        }

        input, textarea, button, img, select {
            border-radius: 0px !important;
        }

        body {
            font-family: var(--font-body) !important;
            background-image: var(--bg-image-url) !important;
            background-size: cover !important;        
            background-position: 50% 20% !important; 
            background-attachment: fixed !important;  
            color: var(--text-main) !important;
        }

        main {
            background-color: rgba(249, 248, 246, 0.85); 
            padding: 2rem;
            margin-top: 2rem; 
            box-shadow: 6px 6px 0px var(--text-main);
            border: 3px solid var(--text-main);
        }

        header {
            background-color: var(--header-bg) !important;
            border-bottom: 3px solid var(--accent-border) !important;
        }

        header h1 {
            font-family: var(--font-titles) !important;
            font-weight: 400 !important;
            font-size: 3rem !important;
            letter-spacing: 0.02em;
            color: #ffffff !important; 
            text-shadow: 2px 2px 0px var(--text-main);
        }

        h2, h3, .font-display {
            font-family: var(--font-subheadings) !important;
            font-weight: 400 !important;
            font-size: 2.25rem !important;
            letter-spacing: 0.05em;
            color: var(--text-main) !important;
        }

        a {
            color: #ffffff !important;
        }

        .accent-hub {
            background-color: #ffffff !important;
            border: 3px solid var(--text-main);
            color: var(--text-main) !important;
            box-shadow: 4px 4px 0px var(--accent-border);
        }

        button.btn-action, .bg-amber-950 {
            background: var(--btn-bg) !important;
            color: #ffffff !important;
            font-family: var(--font-body) !important;
            border: 2px solid var(--text-main) !important;
            box-shadow: 3px 3px 0px var(--text-main);
            transition: all var(--transition-speed) ease;
        }

        button.btn-action:hover, .bg-amber-950:hover {
            background: var(--header-bg) !important;
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px var(--text-main);
        }

        .folder-icon-wrapper {
            transition: transform 0.15s ease;
        }
        .folder-icon-wrapper:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen pb-12 text-stone-900">
    <header class="bg-white py-6 px-8 mb-8 shadow-sm text-center">
        <h1 class="tracking-wide">AP Art Helper</h1>
    </header>

    <div id="auth-container" class="max-w-xl mx-auto my-4 p-6 bg-white/95 border-3 border-stone-900 shadow-[6px_6px_0px_#260808] hidden">
        <h2 class="text-2xl font-bold mb-4 font-serif text-center" id="auth-title">Sign In to Cloud Sync</h2>
        
        <div class="space-y-3">
            <button type="button" onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-stone-900 text-stone-900 font-bold py-2 hover:bg-stone-50 transition-colors cursor-pointer shadow-[2px_2px_0px_#260808]">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="w-5 h-5">
                Continue with Google
            </button>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-stone-300"></div>
                <span class="flex-shrink mx-4 text-xs font-bold text-stone-400 uppercase">Or use password</span>
                <div class="flex-grow border-t border-stone-300"></div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-stone-900">Email Address</label>
                <input type="email" id="auth-email" class="w-full p-2 border border-stone-400 bg-stone-50 text-stone-900" placeholder="artist@school.edu">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-stone-900">Password</label>
                <input type="password" id="auth-password" class="w-full p-2 border border-stone-400 bg-stone-50 text-stone-900" placeholder="••••••••">
            </div>

            <div class="flex flex-col space-y-2 pt-2">
                <button type="button" onclick="handleEmailLogin()" class="w-full bg-stone-900 text-white font-medium py-2 hover:bg-stone-800 transition-colors cursor-pointer">
                    Log In with Email
                </button>
                <button type="button" onclick="handleEmailSignUp()" class="w-full border-2 border-stone-900 text-stone-900 font-medium py-2 hover:bg-stone-100 transition-colors cursor-pointer">
                    Create New Account
                </button>
            </div>
        </div>
    </div>

    <div id="user-bar" class="max-w-4xl mx-auto px-4 py-2 flex justify-end items-center gap-4 text-sm hidden">
        <span id="user-display-email" class="font-medium bg-white/80 px-2 py-1 border border-stone-300 text-stone-900"></span>
        <button type="button" onclick="handleSignOut()" class="text-red-700 hover:underline font-bold cursor-pointer">Sign Out</button>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <section class="mb-8">
            <div class="bg-white p-6 flex flex-col md:flex-row md:items-start justify-between gap-6 accent-hub">
                <div class="flex-1">
                    <h2 class="mb-1 flex items-center gap-2">
                       Sustained Investigation
                    </h2>
                    <div id="si-display-box" class="text-sm italic whitespace-pre-wrap leading-relaxed bg-stone-50 border border-stone-200 p-4 min-h-[4.5rem]">
                        No investigation question yet. Click the edit button to write one.
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-2 self-start md:self-auto">
                    <button onclick="openSustainedInvestigation()" class="btn-action px-5 py-3 text-sm font-medium cursor-pointer flex items-center gap-2 whitespace-nowrap">
                         Edit Inquiry
                    </button>
                    <button onclick="publishFolderAsZIP()" class="btn-action px-5 py-3 text-sm font-medium cursor-pointer flex items-center gap-2 whitespace-nowrap bg-amber-950">
                         📦 Publish Folder Layout (.ZIP Archive)
                    </button>
                </div>
            </div>
        </section>

        <section class="mb-6 flex flex-wrap items-center justify-between border-b-2 border-stone-300 pb-3 gap-y-3">
            <div class="flex items-center gap-2 text-sm font-medium">
                <span onclick="navigateToRootDirectory()" class="cursor-pointer hover:underline text-stone-500">Root</span>
                <span id="nav-breadcrumb-separator" class="text-stone-400 hidden">/</span>
                <span id="nav-breadcrumb-current" class="text-stone-900 font-bold"></span>
            </div>
           
            <div class="flex items-center gap-3">
                <button id="export-project-btn" onclick="exportDataToJSONFile()" class="bg-stone-100 hover:bg-stone-200 text-stone-800 font-bold text-xs px-3 py-2 border border-stone-400 transition-colors cursor-pointer">
                    ⬇️ Export Project File
                </button>
                <label id="import-project-label" class="bg-stone-100 hover:bg-stone-200 text-stone-800 font-bold text-xs px-3 py-2 border border-stone-400 transition-colors cursor-pointer">
                    ⚙️ Import Backup
                    <input type="file" id="project-import-input" accept=".json" onchange="importDataFromJSONFile(event)" class="hidden">
                </label>
                
                <button id="add-folder-action-btn" onclick="promptNewFolder()" class="btn-action font-medium text-sm px-4 py-2 cursor-pointer">
                    + New Folder
                </button>
                <button id="add-artwork-action-btn" onclick="openNewArtPieceInActiveFolder()" class="btn-action font-medium text-sm px
